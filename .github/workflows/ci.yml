name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: local-bridge/package-lock.json

      - name: Install dependencies
        working-directory: local-bridge
        run: npm ci

      - name: Build
        working-directory: local-bridge
        run: npm run build

      - name: Test
        working-directory: local-bridge
        run: npm test

  lint-scripts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check shell scripts syntax
        run: |
          for f in scripts/*.sh setup.sh install.sh; do
            echo "Checking $f..."
            bash -n "$f"
          done

      - name: ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: .
          severity: error
          additional_files: setup.sh install.sh

  install-test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Test install script (local clone)
        run: |
          export TEST_HOME="$RUNNER_TEMP/remote-cc-home"
          export REMOTE_CC_HOME="$TEST_HOME/.remote-cc-test"
          export REMOTE_CC_REPO_URL="$PWD"

          mkdir -p "$TEST_HOME/projects"

          # Fresh install through the real installer entrypoint.
          HOME="$TEST_HOME" ./install.sh --dir "$REMOTE_CC_HOME"
          "$TEST_HOME/.local/bin/ccc" help

          # Non-interactive config generation for one-command setup mode.
          HOME="$TEST_HOME" ./install.sh \
            --dir "$REMOTE_CC_HOME" \
            --host root@example.com \
            --ssh-port 2222 \
            --bridge-port 4100 \
            --roots "$TEST_HOME/projects" \
            --skip-deploy

          grep -q '^REMOTE_CC_HOST=root@example.com$' "$REMOTE_CC_HOME/.remote-cc.env"
          grep -q '^REMOTE_CC_SSH_PORT=2222$' "$REMOTE_CC_HOME/.remote-cc.env"
          grep -q '^REMOTE_CC_PORT=4100$' "$REMOTE_CC_HOME/.remote-cc.env"
          grep -q "^REMOTE_CC_ROOTS=$TEST_HOME/projects$" "$REMOTE_CC_HOME/.remote-cc.env"

      - name: Test bridge builds
        working-directory: local-bridge
        run: |
          npm install --silent
          npm run build
